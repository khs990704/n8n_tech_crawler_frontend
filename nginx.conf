server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅: 파일이 없으면 index.html로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 자산 캐싱
    location ~* \.(js|css|woff|woff2|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
